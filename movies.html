<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Diary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #fdf6f0 0%, #f0e6f6 50%, #e8f0fe 100%);
    color: #2c2c2e;
    min-height: 100vh;
    padding: 40px 20px;
    padding-top: 70px;
    overflow-x: hidden;
    transition: background 0.5s, color 0.4s;
  }

  /* ---- Dark mode ---- */
  body.dark-mode {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #e0e0e0;
  }
  body.dark-mode .top-nav { background: rgba(20,20,40,0.85); border-bottom-color: rgba(255,255,255,0.06); }
  body.dark-mode .nav-link { color: #8888aa; }
  body.dark-mode .nav-link.active { color: #c4b5fd; background: rgba(167,139,250,0.15); }
  body.dark-mode .movie-card { background: rgba(30,30,50,0.7); border-color: rgba(255,255,255,0.08); }
  body.dark-mode .movie-title { color: #e0e0e0; }
  body.dark-mode .add-movie-form { background: rgba(30,30,50,0.7); border-color: rgba(255,255,255,0.08); }
  body.dark-mode .mode-toggle, body.dark-mode .filter-bar { background: rgba(30,30,50,0.5); border-color: rgba(255,255,255,0.06); }
  body.dark-mode .mode-toggle button.active, body.dark-mode .filter-bar button.active { background: rgba(60,60,90,0.8); color: #c4b5fd; }
  body.dark-mode input, body.dark-mode textarea, body.dark-mode select { background: rgba(30,30,50,0.6); border-color: rgba(255,255,255,0.1); color: #e0e0e0; }
  body.dark-mode input::placeholder, body.dark-mode textarea::placeholder { color: #666; }
  body.dark-mode .modal { background: #1a1a2e; color: #e0e0e0; }
  body.dark-mode .modal h2 { color: #e0e0e0; }
  body.dark-mode .note-entry { background: rgba(167,139,250,0.1); }
  body.dark-mode .note-text { color: #e0e0e0; }
  body.dark-mode .movie-actions button { background: rgba(30,30,50,0.6); border-color: rgba(255,255,255,0.08); color: #aaa; }
  body.dark-mode .user-bar .user-name { color: #aaa; }
  body.dark-mode .signout-btn { background: rgba(30,30,50,0.6); color: #8888aa; border-color: rgba(255,255,255,0.06); }
  body.dark-mode .settings-panel { background: rgba(30,30,50,0.7); border-color: rgba(255,255,255,0.08); }
  body.dark-mode .google-signin-btn { background: rgba(30,30,50,0.7); border-color: rgba(255,255,255,0.08); color: #e0e0e0; }
  body.dark-mode h1 { background: linear-gradient(135deg, #c4b5fd, #f0abfc); -webkit-background-clip: text; background-clip: text; }
  body.dark-mode .poster-fallback { background: linear-gradient(135deg, #2d2250, #1e1a3a); }
  body.dark-mode .access-denied { background: rgba(239,68,68,0.1); }

  /* Dark mode toggle */
  .dark-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 9500;
    width: 52px; height: 52px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px); font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .dark-toggle:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(0,0,0,0.15); }
  body.dark-mode .dark-toggle { background: rgba(30,30,50,0.8); border-color: rgba(255,255,255,0.1); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }

  /* Page fade-in */
  .page-fade { animation: pageFadeIn 0.5s ease-out; }
  @keyframes pageFadeIn {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .page-fade-out { animation: pageFadeOut 0.25s ease-in forwards; }
  @keyframes pageFadeOut {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-8px); }
  }

  /* Cat loading spinner */
  .cat-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
  .cat-loader .walking-cat { font-size: 36px; animation: catWalk 1.2s ease-in-out infinite; }
  @keyframes catWalk {
    0% { transform: translateX(-20px) scaleX(1); }
    49% { transform: translateX(20px) scaleX(1); }
    50% { transform: translateX(20px) scaleX(-1); }
    99% { transform: translateX(-20px) scaleX(-1); }
    100% { transform: translateX(-20px) scaleX(1); }
  }
  .cat-loader .loader-dots { font-size: 14px; color: #aeaeb2; animation: dotPulse 1.5s ease-in-out infinite; }
  @keyframes dotPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* 3D tilt on movie cards */
  .movie-card {
    transform-style: preserve-3d;
    perspective: 800px;
    transition: all 0.3s ease;
  }

  /* Confetti celebration */
  .celebration { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 9999; }
  .confetti-cat { position: absolute; animation: confettiFall 2s ease-in forwards; opacity: 0; }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(0.8); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
  }

  /* ---- World clocks ---- */
  .world-clocks {
    position: fixed; top: 56px; left: 12px; z-index: 8999;
    display: flex; flex-direction: column; gap: 2px;
    font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace;
    opacity: 0.7; transition: opacity 0.3s;
  }
  .world-clocks:hover { opacity: 1; }
  .clock-row { display: flex; align-items: center; gap: 5px; }
  .clock-label { color: #a78bfa; font-weight: 600; min-width: 28px; }
  .clock-time { color: #6b6b6f; }
  body.dark-mode .clock-time { color: #aaa; }
  body.dark-mode .clock-label { color: #c4b5fd; }
  @media (max-width: 600px) { .world-clocks { font-size: 11px; top: 52px; left: 8px; } }

  /* ---- Top navigation bar ---- */
  .top-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 9000;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    padding: 0 20px;
  }

  .top-nav-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 4px;
    height: 48px;
  }

  .nav-link {
    padding: 8px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    color: #8e8e93;
    text-decoration: none;
    transition: all 0.25s;
  }

  .nav-link:hover {
    color: #6b6b6f;
    background: rgba(167,139,250,0.06);
  }

  .nav-link.active {
    color: #7c5cbf;
    background: rgba(167,139,250,0.1);
    font-weight: 600;
  }

  /* Cat cursor - replaced by oneko.js */

  /* Decorative floating cats */
  .floating-decor {
    position: fixed;
    pointer-events: none;
    opacity: 0.08;
    font-size: 40px;
    animation: floatAround 20s ease-in-out infinite;
  }

  .floating-decor:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
  .floating-decor:nth-child(2) { top: 70%; right: 8%; animation-delay: -7s; font-size: 30px; }
  .floating-decor:nth-child(3) { bottom: 15%; left: 12%; animation-delay: -13s; font-size: 35px; }

  @keyframes floatAround {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(10px, -15px) rotate(5deg); }
    50% { transform: translate(-5px, -25px) rotate(-3deg); }
    75% { transform: translate(15px, -10px) rotate(4deg); }
  }

  @keyframes gentleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header-icon {
    font-size: 48px;
    margin-bottom: 8px;
    display: block;
    animation: gentleBounce 3s ease-in-out infinite;
  }

  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #7c5cbf, #e07ba0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ---- Auth / Login screen ---- */
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    text-align: center;
  }

  .login-screen .header-icon { font-size: 64px; margin-bottom: 16px; }
  .login-screen h1 { font-size: 36px; margin-bottom: 8px; }

  .login-subtitle {
    color: #8e8e93;
    font-size: 15px;
    margin-bottom: 32px;
  }

  .google-signin-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 14px 32px;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;

    color: #2c2c2e;
    transition: all 0.25s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .google-signin-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }

  .google-signin-btn svg { width: 20px; height: 20px; }

  .access-denied {
    margin-top: 24px;
    padding: 20px 28px;
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.15);
    border-radius: 14px;
    color: #dc2626;
    font-size: 14px;
    line-height: 1.6;
    max-width: 400px;
  }

  .access-denied strong { display: block; margin-bottom: 4px; }

  /* ---- Top user bar ---- */
  .welcome-greeting {
    text-align: center; font-size: 18px; font-weight: 600; padding: 14px 0 6px;
    color: #7c5cbf; letter-spacing: 0.3px; animation: greetFadeIn 0.8s ease;
  }
  .welcome-greeting .greeting-emoji { font-size: 22px; }
  @keyframes greetFadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  body.dark-mode .welcome-greeting { color: #c4a8ff; }

  .user-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    margin-bottom: 20px;
  }

  .user-bar img {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(167,139,250,0.3);
  }

  .user-bar .user-name {
    font-size: 13px;
    font-weight: 500;
    color: #6b6b6f;
  }

  .signout-btn {
    padding: 6px 14px;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 8px;
    font-size: 12px;
    font-family: inherit;

    color: #8e8e93;
    transition: all 0.2s;
  }

  .signout-btn:hover {
    color: #ef4444;
    border-color: rgba(239,68,68,0.2);
  }

  /* ---- Mode toggle (My / Shared) ---- */
  .mode-toggle {
    display: flex;
    background: rgba(255,255,255,0.5);
    border-radius: 12px;
    padding: 3px;
    margin-bottom: 16px;
    border: 1px solid rgba(0,0,0,0.04);
    backdrop-filter: blur(10px);
  }

  .mode-toggle button {
    flex: 1;
    padding: 10px 16px;
    border: none;
    background: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;

    color: #8e8e93;
    transition: all 0.25s;
  }

  .mode-toggle button.active {
    background: rgba(255,255,255,0.85);
    color: #7c5cbf;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    font-weight: 600;
  }

  .mode-toggle button:hover:not(.active) {
    color: #6b6b6f;
  }

  /* ---- Add movie form ---- */
  .add-movie-form {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(20px);
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    border: 1px solid rgba(255,255,255,0.7);
    padding: 20px;
    margin-bottom: 24px;
  }

  .form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-row:last-child { margin-bottom: 0; }

  .add-movie-form input[type="text"],
  .add-movie-form input[type="url"],
  .add-movie-form textarea {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(20px);
    outline: none;
    transition: all 0.25s;

  }

  .add-movie-form input:focus,
  .add-movie-form textarea:focus {
    border-color: #a78bfa;
    box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
  }

  .add-movie-form input::placeholder,
  .add-movie-form textarea::placeholder { color: #c7c7cc; }

  .add-movie-form textarea {
    resize: vertical;
    min-height: 60px;
  }

  .year-input { max-width: 90px; }

  .add-movie-form button[type="submit"] {
    padding: 12px 24px;
    background: linear-gradient(135deg, #a78bfa, #c084fc);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;

    font-family: inherit;
    transition: all 0.25s;
    box-shadow: 0 4px 14px rgba(167,139,250,0.35);
    white-space: nowrap;
  }

  .add-movie-form button[type="submit"]:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(167,139,250,0.45);
  }

  .poster-preview {
    margin-top: 8px;
    text-align: center;
  }

  .poster-preview img {
    max-height: 120px;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

  .poster-preview.hidden { display: none; }

  /* ---- Filter bar ---- */
  .filter-bar {
    display: flex;
    background: rgba(255,255,255,0.5);
    border-radius: 12px;
    padding: 3px;
    margin-bottom: 24px;
    border: 1px solid rgba(0,0,0,0.04);
    backdrop-filter: blur(10px);
  }

  .filter-bar button {
    flex: 1;
    padding: 8px 14px;
    border: none;
    background: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;

    color: #8e8e93;
    transition: all 0.25s;
  }

  .filter-bar button.active {
    background: rgba(255,255,255,0.85);
    color: #7c5cbf;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    font-weight: 600;
  }

  .filter-bar button:hover:not(.active) {
    color: #6b6b6f;
  }

  /* ---- Movie grid ---- */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .movie-card {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    border: 1px solid rgba(255,255,255,0.7);
    overflow: hidden;
    transition: all 0.25s;
    position: relative;
  }

  .movie-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }

  .movie-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: linear-gradient(135deg, #e8d5f5, #d1c4e9);
  }

  .poster-fallback {
    width: 100%;
    aspect-ratio: 2/3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e8d5f5, #d1c4e9);
    font-size: 48px;
  }

  .movie-info {
    padding: 12px;
  }

  .movie-title {
    font-size: 14px;
    font-weight: 600;
    color: #2c2c2e;
    margin-bottom: 4px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .movie-year {
    font-size: 12px;
    color: #8e8e93;
    margin-bottom: 8px;
  }

  .watched-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    margin-bottom: 6px;
  }

  .watched-badge.watched {
    background: rgba(52,199,89,0.12);
    color: #30a46c;
  }

  .watched-badge.unwatched {
    background: rgba(167,139,250,0.12);
    color: #7c5cbf;
  }

  .movie-score {
    font-size: 12px;
    color: #f59e0b;
    margin-bottom: 4px;
  }

  .movie-watched-date {
    font-size: 11px;
    color: #aeaeb2;
    margin-bottom: 4px;
  }

  .notes-preview {
    font-size: 12px;
    color: #aeaeb2;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-top: 4px;
  }

  .movie-actions {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }

  .movie-actions button {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid rgba(0,0,0,0.06);
    background: rgba(255,255,255,0.7);
    border-radius: 8px;
    font-size: 11px;
    font-family: inherit;

    color: #6b6b6f;
    transition: all 0.2s;
  }

  .movie-actions button:hover {
    border-color: #a78bfa;
    color: #7c5cbf;
    background: rgba(167,139,250,0.08);
  }

  .movie-actions .delete-movie-btn:hover {
    border-color: #ef4444;
    color: #ef4444;
    background: rgba(239,68,68,0.06);
  }

  /* ---- Empty state ---- */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #aeaeb2;
    font-size: 15px;
    line-height: 1.8;
  }

  .empty-state .empty-cat {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
    animation: gentleBounce 3s ease-in-out infinite;
  }

  /* ---- Notes modal ---- */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: #fff;
    border-radius: 20px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 28px;

  }

  .modal h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #2c2c2e;
  }

  .modal .modal-year {
    font-size: 13px;
    color: #8e8e93;
    margin-bottom: 20px;
  }

  .modal-poster {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
    border-radius: 12px;
    margin-bottom: 16px;
  }

  .notes-list {
    margin-bottom: 16px;
  }

  .note-entry {
    padding: 12px;
    background: rgba(167,139,250,0.06);
    border-radius: 12px;
    margin-bottom: 8px;
  }

  .note-entry .note-author {
    font-size: 11px;
    font-weight: 600;
    color: #7c5cbf;
    margin-bottom: 4px;
  }

  .note-entry .note-text {
    font-size: 14px;
    color: #2c2c2e;
    line-height: 1.5;
  }

  .note-entry .note-date {
    font-size: 10px;
    color: #aeaeb2;
    margin-top: 4px;
  }

  .add-note-form {
    display: flex;
    gap: 8px;
  }

  .add-note-form textarea {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: vertical;
    min-height: 50px;

  }

  .add-note-form textarea:focus {
    border-color: #a78bfa;
    box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
  }

  .add-note-form button {
    padding: 10px 18px;
    background: linear-gradient(135deg, #a78bfa, #c084fc);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;

    font-family: inherit;
    align-self: flex-end;
  }

  .modal-close-btn {
    display: block;
    margin-top: 16px;
    width: 100%;

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut as fbSignOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDSUEcHJVBc2IutR0AGrEfh2yG4-yavzqs",
    authDomain: "daily-checklist-66354.firebaseapp.com",
    projectId: "daily-checklist-66354",
    storageBucket: "daily-checklist-66354.firebasestorage.app",
    messagingSenderId: "463989061261",
    appId: "1:463989061261:web:f12eecdbc983d11ec814c4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const OWNER_EMAIL = "florafan26@gmail.com";

  let currentUser = null;
  let currentMode = 'my';
  let currentFilter = 'all';
  let currentMovies = [];
  let unsubMovies = null;
  let unsubMembers = null;
  let openMovieId = null;

  // --- Helpers ---
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  // --- Firestore paths ---
  function moviesCollectionPath() {
    if (currentMode === 'my') {
      return `users/${currentUser.uid}/movies`;
    } else {
      return `shared/movies/items`;
    }
  }

  // --- Auth ---
  window.googleSignIn = async function() {
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      console.error('Sign-in error:', e);
    }
  };

  window.signOut = async function() {
    await fbSignOut(auth);
  };

  async function checkAccess(email) {
    if (email === OWNER_EMAIL) return true;
    const snap = await getDocs(collection(db, 'allowedUsers'));
    for (const d of snap.docs) {
      if (d.data().email === email) return true;
    }
    return false;
  }

  async function ensureOwnerInAllowed() {
    const docRef = doc(db, 'allowedUsers', OWNER_EMAIL);
    await setDoc(docRef, { email: OWNER_EMAIL, addedBy: 'owner' }, { merge: true });
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const allowed = await checkAccess(user.email);
      if (!allowed) {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appContainer').style.display = 'none';
        document.getElementById('topNav').style.display = 'none'; document.getElementById('worldClocks').style.display = 'none';
        document.getElementById('accessDenied').style.display = 'block';
        return;
      }
      currentUser = user;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appContainer').style.display = 'block';
      document.getElementById('topNav').style.display = 'block'; document.getElementById('worldClocks').style.display = 'flex';
      document.getElementById('userAvatar').src = user.photoURL || '';
      document.getElementById('userName').textContent = user.displayName || user.email;
      // Welcome greeting
      (function() {
        var nicknames = { 'florafan26@gmail.com': 'XIXI', 'h.han.working@gmail.com': 'HANHAN' };
        var name = nicknames[user.email.toLowerCase()] || (user.displayName || 'friend');
        var h = new Date().getHours();
        var timeGreet = h < 6 ? 'Good night' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
        var emoji = h < 6 ? '🌙' : h < 12 ? '🌸' : h < 18 ? '☀️' : '🌙';
        document.getElementById('welcomeGreeting').innerHTML = '<span class="greeting-emoji">' + emoji + '</span> ' + timeGreet + ', ' + name + '!';
      })();
      const isOwner = user.email === OWNER_EMAIL;
      document.getElementById('settingsToggleBtn').style.display = isOwner ? 'block' : 'none';
      document.getElementById('settingsPanel').classList.add('hidden');
      await ensureOwnerInAllowed();
      subscribeToMovies();
      if (isOwner) subscribeToMembers();
    } else {
      currentUser = null;
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appContainer').style.display = 'none';
      document.getElementById('topNav').style.display = 'none'; document.getElementById('worldClocks').style.display = 'none';
      document.getElementById('accessDenied').style.display = 'none';
      if (unsubMovies) { unsubMovies(); unsubMovies = null; }
      if (unsubMembers) { unsubMembers(); unsubMembers = null; }
    }
  });

  // --- Firestore subscription ---
  function subscribeToMovies() {
    if (unsubMovies) { unsubMovies(); unsubMovies = null; }
    const colRef = collection(db, moviesCollectionPath());
    unsubMovies = onSnapshot(colRef, (snapshot) => {
      currentMovies = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      // Sort by addedAt descending (newest first)
      currentMovies.sort((a, b) => {
        const ta = a.addedAt ? (a.addedAt.seconds || 0) : 0;
        const tb = b.addedAt ? (b.addedAt.seconds || 0) : 0;
        return tb - ta;
      });
      render();
      // Update open modal if any
      if (openMovieId) {
        const movie = currentMovies.find(m => m.id === openMovieId);
        if (movie) renderModalNotes(movie);
      }
    });
  }

  function subscribeToMembers() {
    if (unsubMembers) { unsubMembers(); unsubMembers = null; }
    unsubMembers = onSnapshot(collection(db, 'allowedUsers'), (snapshot) => {
      const members = snapshot.docs.map(d => d.data());
      renderMembers(members);
    });
  }

  // --- Render ---
  function render() {
    const gridEl = document.getElementById('movieGrid');
    let movies = currentMovies;

    if (currentFilter === 'watched') {
      movies = movies.filter(m => m.watched);
    } else if (currentFilter === 'unwatched') {
      movies = movies.filter(m => !m.watched);
    }

    if (movies.length === 0) {
      const msg = currentMovies.length === 0
        ? 'No movies yet.<br>Add one above!'
        : 'No movies match this filter.';
      gridEl.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><span class="empty-cat">\uD83C\uDFAC</span>' + msg + '</div>';
      return;
    }

    const isShared = currentMode === 'shared';
    gridEl.innerHTML = movies.map(movie => {
      const posterHtml = movie.poster
        ? `<img class="movie-poster" src="${escapeHtml(movie.poster)}" alt="" onerror="this.outerHTML='<div class=\\'poster-fallback\\'>\\uD83C\\uDFAC</div>'">`
        : '<div class="poster-fallback">\uD83C\uDFAC</div>';

      const watchedClass = movie.watched ? 'watched' : 'unwatched';
      const watchedText = movie.watched ? 'Watched' : 'Unwatched';

      // Score display
      let scoreHtml = '';
      if (movie.score && movie.score > 0) {
        scoreHtml = '<div class="movie-score">' + '★'.repeat(movie.score) + '☆'.repeat(5 - movie.score) + '</div>';
      }

      // Watched date display
      let watchedDateHtml = '';
      if (movie.watched && movie.watchedDate) {
        watchedDateHtml = '<div class="movie-watched-date">Watched ' + escapeHtml(movie.watchedDate) + '</div>';
      }

      let notesPreview = '';
      if (isShared && Array.isArray(movie.notes) && movie.notes.length > 0) {
        const last = movie.notes[movie.notes.length - 1];
        notesPreview = `<div class="notes-preview">${escapeHtml(last.text)}</div>`;
      } else if (!isShared && movie.notes && typeof movie.notes === 'string') {
        notesPreview = `<div class="notes-preview">${escapeHtml(movie.notes)}</div>`;
      }

      return `
        <div class="movie-card" data-id="${movie.id}">
          ${posterHtml}
          <div class="movie-info">
            <div class="movie-title">${escapeHtml(movie.title)}</div>
            ${movie.year ? '<div class="movie-year">' + escapeHtml(movie.year) + '</div>' : ''}
            <span class="watched-badge ${watchedClass}">${watchedText}</span>
            ${scoreHtml}
            ${watchedDateHtml}
            ${notesPreview}
            <div class="movie-actions">
              <button onclick="toggleWatched('${movie.id}', ${!movie.watched})">${movie.watched ? 'Unwatched' : 'Watched'}</button>
              <button onclick="openEditModal('${movie.id}')">Edit</button>
              <button onclick="openNotes('${movie.id}')">Notes</button>
              <button class="delete-movie-btn" onclick="deleteMovie('${movie.id}')">Del</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderMembers(members) {
    const list = document.getElementById('memberList');
    list.innerHTML = members.map(m => `
      <li>
        <span>${escapeHtml(m.email)}${m.email === OWNER_EMAIL ? '<span class="member-owner-badge">Owner</span>' : ''}</span>
        ${m.email !== OWNER_EMAIL ? `<button class="remove-member-btn" onclick="removeMember('${escapeHtml(m.email)}')">&times;</button>` : ''}
      </li>
    `).join('');
  }

  let addScore = 0;

  window.setAddScore = function(n) {
    addScore = (addScore === n) ? 0 : n;
    const stars = document.getElementById('addScoreRow').querySelectorAll('.score-star');
    stars.forEach((s, i) => s.classList.toggle('active', i < addScore));
  };

  // --- Actions ---
  window.addMovie = async function(e) {
    e.preventDefault();
    const titleInput = document.getElementById('movieTitle');
    const yearInput = document.getElementById('movieYear');
    const posterInput = document.getElementById('moviePoster');
    const notesInput = document.getElementById('movieNotes');
    const watchedDateInput = document.getElementById('movieWatchedDate');

    const title = titleInput.value.trim();
    if (!title) return;

    const id = generateId();
    const isShared = currentMode === 'shared';
    const watchedDate = watchedDateInput.value || '';
    const movieData = {
      title,
      year: yearInput.value.trim(),
      poster: posterInput.value.trim(),
      watched: !!watchedDate,
      watchedDate: watchedDate,
      score: addScore,
      addedAt: new Date()
    };

    if (isShared) {
      movieData.notes = [];
      movieData.addedBy = currentUser.displayName || currentUser.email;
      // Add initial note if provided
      const noteText = notesInput.value.trim();
      if (noteText) {
        movieData.notes.push({
          author: currentUser.displayName || currentUser.email,
          text: noteText,
          date: new Date().toISOString()
        });
      }
    } else {
      movieData.notes = notesInput.value.trim();
    }

    await setDoc(doc(db, moviesCollectionPath(), id), movieData);
    titleInput.value = '';
    yearInput.value = '';
    posterInput.value = '';
    notesInput.value = '';
    watchedDateInput.value = '';
    addScore = 0;
    document.getElementById('addScoreRow').querySelectorAll('.score-star').forEach(s => s.classList.remove('active'));
    document.getElementById('posterPreview').classList.add('hidden');
    titleInput.focus();
  };

  window.toggleWatched = async function(id, newVal) {
    const update = { watched: newVal };
    if (newVal) {
      update.watchedDate = new Date().toISOString().split('T')[0];
    } else {
      update.watchedDate = '';
    }
    await updateDoc(doc(db, moviesCollectionPath(), id), update);
    if (newVal && window.celebrateCats) celebrateCats();
  };

  window.deleteMovie = async function(id) {
    if (!confirm('Delete this movie?')) return;
    await deleteDoc(doc(db, moviesCollectionPath(), id));
  };

  window.setMode = function(mode) {
    currentMode = mode;
    document.getElementById('btnMyMode').classList.toggle('active', mode === 'my');
    document.getElementById('btnSharedMode').classList.toggle('active', mode === 'shared');
    subscribeToMovies();
  };

  window.setFilter = function(filter) {
    currentFilter = filter;
    document.getElementById('filterAll').classList.toggle('active', filter === 'all');
    document.getElementById('filterUnwatched').classList.toggle('active', filter === 'unwatched');
    document.getElementById('filterWatched').classList.toggle('active', filter === 'watched');
    render();
  };

  window.previewPoster = function() {
    const url = document.getElementById('moviePoster').value.trim();
    const preview = document.getElementById('posterPreview');
    const img = document.getElementById('posterPreviewImg');
    if (url) {
      img.src = url;
      img.onerror = () => preview.classList.add('hidden');
      img.onload = () => preview.classList.remove('hidden');
    } else {
      preview.classList.add('hidden');
    }
  };

  // --- Notes modal ---
  window.openNotes = function(movieId) {
    openMovieId = movieId;
    const movie = currentMovies.find(m => m.id === movieId);
    if (!movie) return;

    document.getElementById('modalTitle').textContent = movie.title;
    document.getElementById('modalYear').textContent = movie.year || '';

    const posterEl = document.getElementById('modalPoster');
    if (movie.poster) {
      posterEl.src = movie.poster;
      posterEl.style.display = 'block';
    } else {
      posterEl.style.display = 'none';
    }

    renderModalNotes(movie);
    document.getElementById('notesModal').classList.remove('hidden');
    document.getElementById('modalNoteInput').value = '';
  };

  function renderModalNotes(movie) {
    const container = document.getElementById('modalNotes');
    const isShared = currentMode === 'shared';

    if (isShared && Array.isArray(movie.notes)) {
      if (movie.notes.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:#aeaeb2; padding:12px; font-size:13px;">No notes yet. Be the first to add one!</div>';
      } else {
        container.innerHTML = movie.notes.map(n => `
          <div class="note-entry">
            <div class="note-author">${escapeHtml(n.author)}</div>
            <div class="note-text">${escapeHtml(n.text)}</div>
            <div class="note-date">${n.date ? new Date(n.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : ''}</div>
          </div>
        `).join('');
      }
    } else {
      // Personal mode - single text note
      const noteText = (typeof movie.notes === 'string') ? movie.notes : '';
      container.innerHTML = noteText
        ? `<div class="note-entry"><div class="note-text">${escapeHtml(noteText)}</div></div>`
        : '<div style="text-align:center; color:#aeaeb2; padding:12px; font-size:13px;">No notes yet.</div>';
    }
  }

  window.addNote = async function() {
    if (!openMovieId) return;
    const input = document.getElementById('modalNoteInput');
    const text = input.value.trim();
    if (!text) return;

    const isShared = currentMode === 'shared';
    const docRef = doc(db, moviesCollectionPath(), openMovieId);

    if (isShared) {
      const noteEntry = {
        author: currentUser.displayName || currentUser.email,
        text: text,
        date: new Date().toISOString()
      };
      await updateDoc(docRef, { notes: arrayUnion(noteEntry) });
    } else {
      // Personal mode: replace note text
      await updateDoc(docRef, { notes: text });
    }
    input.value = '';
  };

  window.closeModal = function() {
    openMovieId = null;
    document.getElementById('notesModal').classList.add('hidden');
  };

  window.closeModalOverlay = function(e) {
    if (e.target === e.currentTarget) closeModal();
  };

  // --- Edit modal ---
  let editMovieId = null;
  let editScore = 0;

  window.openEditModal = function(movieId) {
    editMovieId = movieId;
    const movie = currentMovies.find(m => m.id === movieId);
    if (!movie) return;

    document.getElementById('editTitle').value = movie.title || '';
    document.getElementById('editYear').value = movie.year || '';
    document.getElementById('editPoster').value = movie.poster || '';
    document.getElementById('editWatchedDate').value = movie.watchedDate || '';

    // Set score
    editScore = movie.score || 0;
    const stars = document.getElementById('editScoreRow').querySelectorAll('.score-star');
    stars.forEach((s, i) => s.classList.toggle('active', i < editScore));

    // Notes (personal mode = string, shared = skip editing notes here)
    const isShared = currentMode === 'shared';
    const notesEl = document.getElementById('editNotes');
    if (isShared) {
      notesEl.style.display = 'none';
      notesEl.previousElementSibling.style.display = 'none';
    } else {
      notesEl.style.display = '';
      notesEl.previousElementSibling.style.display = '';
      notesEl.value = (typeof movie.notes === 'string') ? movie.notes : '';
    }

    document.getElementById('editModal').classList.remove('hidden');
  };

  window.setEditScore = function(n) {
    editScore = (editScore === n) ? 0 : n;
    const stars = document.getElementById('editScoreRow').querySelectorAll('.score-star');
    stars.forEach((s, i) => s.classList.toggle('active', i < editScore));
  };

  window.saveEdit = async function() {
    if (!editMovieId) return;
    const isShared = currentMode === 'shared';
    const update = {
      title: document.getElementById('editTitle').value.trim(),
      year: document.getElementById('editYear').value.trim(),
      poster: document.getElementById('editPoster').value.trim(),
      score: editScore,
      watchedDate: document.getElementById('editWatchedDate').value || '',
      watched: !!document.getElementById('editWatchedDate').value
    };
    if (!isShared) {
      update.notes = document.getElementById('editNotes').value.trim();
    }
    await updateDoc(doc(db, moviesCollectionPath(), editMovieId), update);
    closeEditModal();
  };

  window.closeEditModal = function() {
    editMovieId = null;
    document.getElementById('editModal').classList.add('hidden');
  };

  window.closeEditOverlay = function(e) {
    if (e.target === e.currentTarget) closeEditModal();
  };

  // --- Settings / Members ---
  window.toggleSettings = function() {
    document.getElementById('settingsPanel').classList.toggle('hidden');
  };

  window.addMember = async function() {
    const input = document.getElementById('newMemberEmail');
    const email = input.value.trim().toLowerCase();
    if (!email || !email.includes('@')) { alert('Please enter a valid email.'); return; }
    await setDoc(doc(db, 'allowedUsers', email), {
      email: email,
      addedBy: currentUser.displayName || currentUser.email
    });
    input.value = '';
  };

  window.removeMember = async function(email) {
    if (email === OWNER_EMAIL) return;
    if (!confirm('Remove ' + email + ' from allowed members?')) return;
    await deleteDoc(doc(db, 'allowedUsers', email));
  };
</script>

<script>
  // 3D tilt on movie cards
  document.addEventListener('mousemove', e => {
    const card = e.target.closest('.movie-card');
    if (!card) return;
    const rect = card.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;
    card.style.transform = `perspective(800px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg) translateY(-4px)`;
  });
  document.addEventListener('mouseleave', e => {
    if (e.target.classList && e.target.classList.contains('movie-card')) {
      e.target.style.transform = '';
    }
  }, true);
  document.addEventListener('mouseout', e => {
    const card = e.target.closest('.movie-card');
    if (card && !card.contains(e.relatedTarget)) {
      card.style.transform = '';
    }
  });

  // Dark mode toggle
  function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('darkMode', isDark ? '1' : '0');
    document.getElementById('darkToggle').textContent = isDark ? '\uD83D\uDE3E' : '\uD83D\uDE3A';
  }
  if (localStorage.getItem('darkMode') === '1') {
    document.body.classList.add('dark-mode');
    document.getElementById('darkToggle').textContent = '\uD83D\uDE3E';
  }

  // Confetti cats celebration
  window.celebrateCats = function() {
    const container = document.getElementById('celebration');
    const cats = ['\uD83D\uDC08\u200D\u2B1B', '\uD83D\uDC3E', '\u2B50', '\uD83C\uDF1F', '\uD83C\uDFAC', '\uD83C\uDF89'];
    for (let i = 0; i < 15; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-cat';
      el.textContent = cats[Math.floor(Math.random() * cats.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.top = '-30px';
      el.style.fontSize = (16 + Math.random() * 24) + 'px';
      el.style.animationDelay = (Math.random() * 0.8) + 's';
      el.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
      container.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }
  };

  // Smooth page transitions on nav links
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function(e) {
      if (this.classList.contains('active')) { e.preventDefault(); return; }
      e.preventDefault();
      const href = this.getAttribute('href');
      document.body.classList.remove('page-fade');
      document.body.classList.add('page-fade-out');
      setTimeout(() => { window.location.href = href; }, 250);
    });
  });
</script>

<script>
  // World clocks - update every second
  function updateClocks() {
    var now = new Date();
    var fmt = function(tz) {
      var days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
      var o = { timeZone: tz };
      var t = now.toLocaleTimeString("en-US", Object.assign({ hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false }, o));
      var d = now.toLocaleDateString("en-US", Object.assign({ month: "2-digit", day: "2-digit", year: "numeric" }, o));
      var wd = days[new Date(now.toLocaleString("en-US", o)).getDay()];
      return t + "  " + d + "  " + wd;
    };
    var cn = document.getElementById("clockCN");
    var to = document.getElementById("clockTO");
    var ca = document.getElementById("clockCA");
    if (cn) cn.textContent = fmt("Asia/Shanghai");
    if (to) to.textContent = fmt("America/Toronto");
    if (ca) ca.textContent = fmt("America/Los_Angeles");
  }
  updateClocks();
  setInterval(updateClocks, 1000);
</script>
